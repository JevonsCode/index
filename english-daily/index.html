<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f9ff" />
    <title>Daily English</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Daily English</p>
          <h1>每日英语</h1>
          <p class="subtitle">复习 → 学习 → 标记掌握。每天 10 个能直接用到的词。</p>
          <div class="hero-pills" aria-label="学习流程">
            <span>Review</span>
            <span>Words</span>
            <span>Focus</span>
          </div>
        </div>
        <div class="progress-card" aria-label="今日学习进度">
          <span id="todayLabel">Loading...</span>
          <strong id="progressLabel">0 / 0</strong>
          <div class="progress-track" aria-hidden="true"><i id="progressBar"></i></div>
          <small id="progressTip">开始今天的学习</small>
        </div>
      </section>

      <section class="toolbar-card" aria-label="学习日期选择">
        <div class="field">
          <label for="lessonSelect">学习日期</label>
          <select id="lessonSelect"></select>
        </div>
        <button id="resetProgress" type="button">重置进度</button>
      </section>
      <p class="storage-note">进度仅保存在当前设备，最多保留最近 90 天。</p>

      <section class="panel quiz-panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Review</p>
            <h2>复习</h2>
          </div>
          <span>点击题目显示答案</span>
        </div>
        <div id="quizList" class="quiz-list"></div>
      </section>

      <section class="panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Words</p>
            <h2>今日新词</h2>
          </div>
          <span>读音、短语、例句一起记</span>
        </div>
        <div id="categoryTabs" class="category-tabs" aria-label="分类筛选"></div>
        <div id="wordGrid" class="word-grid"></div>
      </section>

      <section class="panel strategy-panel">
        <div class="section-title">
          <div>
            <p class="eyebrow">Focus</p>
            <h2>强化重点</h2>
          </div>
        </div>
        <ul id="focusList" class="focus-list"></ul>
      </section>
    </main>

    <template id="wordCardTemplate">
      <article class="word-card">
        <div class="word-head">
          <div>
            <h3 class="word"></h3>
            <p class="phonetic"></p>
          </div>
          <span class="tag"></span>
        </div>
        <p class="meaning"></p>
        <div class="example-block">
          <p class="phrase"></p>
          <p class="sentence"></p>
        </div>
        <div class="card-actions">
          <button class="copy-button" type="button">复制例句</button>
          <button class="remember-button" type="button">标记已记住</button>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
